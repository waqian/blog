name: build Gmeek

on:
  workflow_dispatch:
  issues:
    types: [opened, edited]
  schedule:
    - cron: "0 16 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Generate blog
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event.repository.owner.id == github.event.sender.id || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v5


      - name: Get config.json
        run: |
          echo "====== check config.json file ======"
          cat config.json
          echo "====== check config.json end  ======"
          jq --version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Clone source code
        run: |
          GMEEK_VERSION=$(jq -r ".GMEEK_VERSION" config.json)
          git clone https://github.com/Meekdai/Gmeek.git /opt/Gmeek
          cd /opt/Gmeek
          lastTag=$(git describe --tags "$(git rev-list --tags --max-count=1)")
          if [ "$GMEEK_VERSION" = 'last' ]; then git checkout "$lastTag"; else git checkout "$GMEEK_VERSION"; fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r /opt/Gmeek/requirements.txt

      - name: Generate new html
        run: |
          ISSUE_NUM='${{ github.event.issue.number || '' }}'
          cp -r ./* /opt/Gmeek/
          cd /opt/Gmeek/
          python Gmeek.py ${{ secrets.GITHUB_TOKEN }} ${{ github.repository }} --issue_number "$ISSUE_NUM"
          cp -a /opt/Gmeek/docs ${{ github.workspace }}
          cp -a /opt/Gmeek/backup ${{ github.workspace }}
          cp /opt/Gmeek/blogBase.json ${{ github.workspace }}

      - name: update html
        run: |
          git config --local user.email "$(jq -r ".email" config.json)"
          git config --local user.name "${{ github.repository_owner }}"
          git add .
          git commit -a -m '🎉auto update by Gmeek action' || echo "nothing to commit"
          git push || echo "nothing to push"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'docs/.'

  deploy:
    name: Deploy blog
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    permissions:
      contents: write
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository metadata for verification
        uses: actions/checkout@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify published content
        shell: bash
        run: |
          set -euo pipefail

          PAGE_URL="${{ steps.deployment.outputs.page_url }}"
          EXPECTED_POST_URL=$(jq -r '
            to_entries
            | map(select(.key|test("^P[0-9]+$")))
            | max_by(.key|ltrimstr("P")|tonumber)
            | .value.postUrl
          ' docs/postList.json)

          echo "Page URL: $PAGE_URL"
          echo "Expected latest post path: $EXPECTED_POST_URL"

          ok=0
          for i in {1..12}; do
            echo "[verify $i/12] checking deployed postList.json..."
            if curl -fsSL "$PAGE_URL/postList.json" | grep -Fq "$EXPECTED_POST_URL"; then
              echo "✅ Publish verified: $EXPECTED_POST_URL found on live site"
              ok=1
              break
            fi
            sleep 10
          done

          if [ "$ok" -ne 1 ]; then
            echo "❌ Publish verification failed after retries."
            echo "Expected path not found on live site: $EXPECTED_POST_URL"
            exit 1
          fi
